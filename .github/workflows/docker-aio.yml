name: build-docker-image-aio

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'server/**'
      - 'Dockerfile.aio'
      - 'docker/image/**'
      - '.github/workflows/docker-aio.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'Dockerfile.aio'
      - 'docker/image/**'
      - '.github/workflows/docker-aio.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: github.event_name != 'pull_request' && env.ALIYUN_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      - name: Compose image tags
        id: tags
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          TAGS="ghcr.io/${REPO_LC}:aio-latest"$'\n'"ghcr.io/${REPO_LC}:aio-${GITHUB_SHA}"
          if [ -n "$ALIYUN_REGISTRY" ] && [ -n "$ALIYUN_NAMESPACE" ]; then
            TAGS="$TAGS"$'\n'"${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/likeshop:aio-latest"
            TAGS="$TAGS"$'\n'"${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/likeshop:aio-${GITHUB_SHA}"
          fi
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS"   >> "$GITHUB_OUTPUT"
          echo "EOF"     >> "$GITHUB_OUTPUT"
          echo "computed tags:"
          echo "$TAGS"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.aio
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha,scope=aio
          cache-to: type=gha,mode=max,scope=aio
