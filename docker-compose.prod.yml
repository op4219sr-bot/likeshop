version: '3'

# 生产部署:直接 docker-compose -f docker-compose.prod.yml up -d 即可
#
# 镜像由 GitHub Actions 自动构建并推送到 GHCR
# 拉取:docker pull ghcr.io/op4219sr-bot/likeshop:latest

services:
  app:
    image: ghcr.io/op4219sr-bot/likeshop:latest
    # 也可以本地构建:把上一行注释掉,放开下面两行
    # build:
    #   context: .
    container_name: likeshop-app
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: likeshop
      DB_PASSWORD: likeshop123
      DB_NAME: likeshop
      DB_PREFIX: ls_
      ADMIN_USER: admin
      ADMIN_PASSWORD: "123456"   # 上线后请到后台修改
      IMPORT_DEMO: "yes"          # 首次启动是否导入示例数据
      APP_DEBUG: "false"
    volumes:
      - likeshop_runtime:/server/runtime
      - likeshop_uploads:/server/public/uploads
      - likeshop_config:/server/config
    ports:
      - "80:80"

  mysql:
    image: mysql:5.7.29
    container_name: likeshop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: likeshop
      MYSQL_USER: likeshop
      MYSQL_PASSWORD: likeshop123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    volumes:
      - likeshop_mysql:/var/lib/mysql

  redis:
    image: redis:6-alpine
    container_name: likeshop-redis
    restart: always
    volumes:
      - likeshop_redis:/data

volumes:
  likeshop_mysql:
  likeshop_redis:
  likeshop_runtime:
  likeshop_uploads:
  likeshop_config:
